<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">


</head>

<body>

<header>
<h1>My To-Do List</h1>
 
<p>Tap a task to complete · click the bin to delete · Drag tasks to reorder </p>
</header>

<div class="card">

<div class="input-row">
<input id="task-input" placeholder="What needs to be done?" maxlength="120">
<button id="add-btn" class="btn-add">Add</button>
</div>

<div class="stats">
<span>Total <b id="count-total">0</b></span>
<span>Done <b id="count-done">0</b></span>
<span>Left <b id="count-left">0</b></span>
</div>

<ul id="task-list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
